# public_reference_index.yaml —— 开放获取资源索引(零书可用,降级链第 2 级)
#
# 含义(CLAUDE.md §2.5):公开层,任何用户不放私有书就能用。供 [开放获取·可访问] 引用。
# 合规:公开可访问资源的站点级稳定地址,完全可提交。
#
# ⚠️ 红线(CLAUDE.md §4):绝不编造 DOI / arXiv 号。
#   - 下面只放**确信不会错的站点级地址**(venue 级)。
#   - 具体某篇论文的 DOI/arXiv 号必须**联网逐条核实后**才能加入 papers: 段,
#     未核实前留空,引用时只能让用户"去该站点检索关键词",不得给假号。

# ---------- 权威开放获取站点(venue 级,稳定)----------
venues:
  - id: cas
    name: "CERN Accelerator School (CAS)"
    type: lecture_proceedings
    url: "https://cas.web.cern.ch/"
    proceedings_via: "CERN Yellow Reports @ https://cds.cern.ch/"
    open_access: true
    topics: [beam_dynamics, space_charge, rf, collective_effects, diagnostics, intro_courses]
    note: "经典入门到进阶讲义;空间电荷、不稳定性等都有专题 school。"

  - id: uspas
    name: "US Particle Accelerator School (USPAS)"
    type: lecture_notes
    url: "https://uspas.fnal.gov/"
    open_access: true
    topics: [beam_dynamics, linac, rings, space_charge, simulation, fundamentals]
    note: "课程材料/讲义公开,适合系统学习与教学引用。"

  - id: jacow
    name: "JACoW (Joint Accelerator Conferences Website)"
    type: conference_proceedings
    url: "https://www.jacow.org/"
    open_access: true
    topics: [all_accelerator_topics, machine_results, design_reports]
    note: "IPAC/LINAC/HB/ICAP 等会议论文;查具体结果的首选。具体论文需站内检索核实。"

  - id: arxiv_accph
    name: "arXiv physics.acc-ph"
    type: preprint
    url: "https://arxiv.org/list/physics.acc-ph/recent"
    open_access: true
    topics: [all_accelerator_topics, theory, methods]
    note: "预印本;引用前应核实是否有同行评审版本与真实 arXiv 号。"

  - id: cds
    name: "CERN Document Server (CDS)"
    type: repository
    url: "https://cds.cern.ch/"
    open_access: true
    topics: [reports, theses, yellow_reports, cas_proceedings]
    note: "CERN 技术报告/黄皮书/学位论文检索入口。"

  - id: prab
    name: "Phys. Rev. Accelerators and Beams (PRAB)"
    type: journal
    url: "https://journals.aps.org/prab/"
    open_access: true
    topics: [peer_reviewed, beam_physics, collective_effects, space_charge]
    note: "完全开放获取的同行评审期刊;具体文章 DOI 需核实后填 papers。"

  - id: juas2024
    name: "JUAS 2024 Proceedings (CERN Yellow Reports, CC-BY 4.0)"
    type: lecture_proceedings_collection
    url: "https://e-publishing.cern.ch/index.php/CYRSP/issue/view/168"
    open_access: true
    topics: [beam_dynamics, transverse, longitudinal, rf, linac, synchrotron_radiation,
             collective_effects, superconducting, diagnostics, colliders, fel, erl,
             plasma_wakefield, electron_accelerator, full_curriculum]
    note: "一整套成体系的加速器物理课程(60+ 章,粒子+电子全谱)。下面 papers 收录了部分已核实章节;
           其余章节去此目录页按章号查,章节 DOI 形如 10.23730/CYRSP-2024-003.<页码>(页码不可推导,引用前须逐篇核实)。"

